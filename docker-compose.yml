version: '3.9'

services:
  # Backend API Service (SQLite)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neo-crm-backend
    environment:
      DATABASE_URL: sqlite:///app/data/crm.db
      RUST_LOG: info
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      # Enables Redis Streams event bus (CQRS/Event streaming parts)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # Enables RabbitMQ worker consumers (thumbnail/report async jobs)
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://crm:crm-pass@rabbitmq:5672/%2f}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      HOST: 0.0.0.0
      PORT: 3000
      MAX_FILE_SIZE: 10485760  # 10MB
    ports:
      - "3000:3000"  # API port
      - "9090:9090"  # Metrics port
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - crm-network

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neo-crm-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crm-network

  # Redis (EventBus + small caching)
  redis:
    image: redis:7-alpine
    container_name: neo-crm-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # RabbitMQ (async jobs: thumbnail.generate, report.export.*)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: neo-crm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: crm
      RABBITMQ_DEFAULT_PASS: crm-pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Prometheus for metrics collection (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: neo-crm-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - crm-network
    profiles:
      - monitoring

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: neo-crm-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3001
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - crm-network
    profiles:
      - monitoring

volumes:
  backend-data:
    driver: local
  backend-uploads:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  crm-network:
    driver: bridge
