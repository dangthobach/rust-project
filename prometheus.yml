# Prometheus configuration for Neo CRM monitoring

global:
  scrape_interval: 15s  # Scrape targets every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'neo-crm'
    environment: 'production'

# Scrape configurations
scrape_configs:
  # Backend API metrics
  - job_name: 'neo-crm-backend'
    static_configs:
      - targets: ['backend:9090']
        labels:
          service: 'backend-api'
          app: 'neo-crm'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

# Alerting rules (optional - can be extended)
# rule_files:
#   - 'alerts/*.yml'

